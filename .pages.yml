media:
  input: images
content:
  - name: blog
    label: บทความ (Blog)
    type: collection
    path: blog
    fields:
      - name: title
        label: ชื่อเรื่อง
        type: string
      - name: cover_image
        label: รูปภาพหน้าปก
        type: image
      - name: description
        label: คำเกริ่นนำ (Excerpt / SEO Description)
        type: string
      - name: category
        label: หมวดหมู่บทความ (Category)
        type: select
        options:
          values:
            - โภชนบริการ
            - โภชนบำบัด
      - name: kn
        label: ข้อมูลทั่วไป
        type: rich-text
      - name: pathophysiology
        label: พยาธิสภาพของโรค
        type: rich-text
      - name: clinical_assessment
        label: การประเมินทางคลินิก
        type: rich-text
      - name: mnt
        label: โภชนบำบัดทางการแพทย์
        type: rich-text
      - name: dietary_guidelines
        label: แนวทางการจัดการอาหาร
        type: rich-text
      - name: food_drug_interactions
        label: ปฏิกิริยาระหว่างอาหารและยา
        type: rich-text
      - name: complication_management
        label: การจัดการภาวะแทรกซ้อน
        type: rich-text
      - name: ncp
        label: กระบวนการดูแลทางโภชนาการ
        type: rich-text
      - name: references
        label: แหล่งอ้างอิง
        type: rich-text
      - name: FAQ
        label: คำถามที่พบบ่อย
        type: rich-text